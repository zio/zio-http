name: Auto-merge bot dependency PRs

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'zio-scala-steward[bot]'
    steps:
      - name: Enable auto-merge for bot PR
        if: github.event_name == 'pull_request_target'
        run: gh pr merge --auto --squash ${{ github.event.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Backfill auto-merge for existing bot PRs
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          for actor in "zio-scala-steward[bot]" "dependabot[bot]"; do
            gh pr list \
              --author "$actor" \
              --state open \
              --json number \
              --jq '.[].number' | \
            xargs -I{} gh pr merge --auto --squash {}
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
