name: CI

env:
  JDK_JAVA_OPTIONS: >-
    -XX:+PrintCommandLineFlags -Xms4G -Xmx8G -XX:+UseG1GC -Xss10M
    -XX:ReservedCodeCacheSize=1G -XX:NonProfiledCodeHeapSize=512m
    -Dfile.encoding=UTF-8

on:
  pull_request:
  push:
    branches: ['main', 'v4.x']

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:25
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Check formatting
        run: chmod +x ./mill && ./mill mill.scalalib.scalafmt/checkFormatAll

  testJvm:
    name: JVM tests — Scala ${{ matrix.scala }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        scala: ['2.13.18', '3.8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:25
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Run JVM tests
        run: >-
          chmod +x ./mill &&
          ./mill
          'h2Codec.jvm[${{ matrix.scala }}].test'
          'serverLoom.jvm[${{ matrix.scala }}].test'
          'zio.jvm[${{ matrix.scala }}].test'

      - name: Validate coverage minimums
        run: |
          chmod +x ./mill
          ./mill 'h2Codec.jvm[${{ matrix.scala }}].scoverage.validateCoverageMinimums'
          ./mill 'serverLoom.jvm[${{ matrix.scala }}].scoverage.validateCoverageMinimums'
          ./mill 'zio.jvm[${{ matrix.scala }}].scoverage.validateCoverageMinimums'

  docsSite:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: website/yarn.lock
      - name: Build docs site
        run: ./build.sh

  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, testJvm, docsSite]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.testJvm.result }}" == "failure" || \
                "${{ needs.docsSite.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
