name: CI

env:
  JDK_JAVA_OPTIONS: >-
    -XX:+PrintCommandLineFlags -Xms4G -Xmx8G -XX:+UseG1GC -Xss10M
    -XX:ReservedCodeCacheSize=1G -XX:NonProfiledCodeHeapSize=512m
    -Dfile.encoding=UTF-8

on:
  pull_request:
  push:
    branches: ['main', 'v4.x']
    tags: ['v*']
  release:
    types: [published]

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v2
        with:
          jvm: temurin:17
          apps: sbt
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Check formatting
        run: sbt "++2.13.18; fmtCheck"

  testJVM:
    name: Test JVM — Scala ${{ matrix.scala }}, JDK ${{ matrix.java }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '25']
        scala: ['2.13.18', '3.3.7']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v2
        with:
          jvm: temurin:${{ matrix.java }}
          apps: sbt
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Set JDK 25 flags
        if: matrix.java == '25'
        run: echo "JAVA_TOOL_OPTIONS=-XX:+UseCompactObjectHeaders" >> "$GITHUB_ENV"
      - name: Compile & Test
        run: sbt "++${{ matrix.scala }}; compile; test"

  testJS:
    name: Test JS — Scala ${{ matrix.scala }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        scala: ['2.13.18', '3.3.7']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v2
        with:
          jvm: temurin:17
          apps: sbt
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Compile & Test JS
        run: sbt "++${{ matrix.scala }}; zioHttpJS/compile; zioHttpJS/test"

  checkDocs:
    name: Check Doc Generation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v2
        with:
          jvm: temurin:17
          apps: sbt
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Generate Scaladoc
        run: sbt "++2.13.18; doc"

  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, testJVM, testJS, checkDocs]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.testJVM.result }}" == "failure" || \
                "${{ needs.testJS.result }}" == "failure" || \
                "${{ needs.checkDocs.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed"

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ci]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup JDK
        uses: coursier/setup-action@v2
        with:
          jvm: temurin:17
          apps: sbt
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Release
        run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          CI_RELEASE_MODE: '1'
      - name: Release Shaded
        run: sbt ci-release
        env:
          PUBLISH_SHADED: 'true'
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          CI_RELEASE_MODE: '1'
