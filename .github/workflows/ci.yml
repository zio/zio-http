name: CI

env:
  JDK_JAVA_OPTIONS: >-
    -XX:+PrintCommandLineFlags -Xms4G -Xmx8G -XX:+UseG1GC -Xss10M
    -XX:ReservedCodeCacheSize=1G -XX:NonProfiledCodeHeapSize=512m
    -Dfile.encoding=UTF-8

on:
  pull_request:
  push:
    branches: ['main', 'v4.x']
    tags: ['v*']
  release:
    types: [published]

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v2
        with:
          jvm: temurin:21
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Check formatting
        run: chmod +x ./mill && ./mill mill.scalalib.scalafmt/checkFormatAll

  compile:
    name: Compile with mill
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v2
        with:
          jvm: temurin:21
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Compile all modules
        run: chmod +x ./mill && ./mill __.compile

  testCoreJvm:
    name: JVM tests — Scala ${{ matrix.scala }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        scala: ['2.13.18', '3.8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v2
        with:
          jvm: temurin:21
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Run supported JVM tests
        run: >-
          chmod +x ./mill &&
          ./mill
          'core.jvm[${{ matrix.scala }}].test'
          'endpoint.jvm[${{ matrix.scala }}].test'
          'nettyCore.jvm[${{ matrix.scala }}].test'
          'nettyServer.jvm[${{ matrix.scala }}].test'
          'nettyClient.jvm[${{ matrix.scala }}].test'
          'testkit.jvm[${{ matrix.scala }}].test'

  docsSite:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: website/yarn.lock
      - name: Build docs site
        run: ./build.sh

  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, compile, testCoreJvm, docsSite]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.compile.result }}" == "failure" || \
                "${{ needs.testCoreJvm.result }}" == "failure" || \
                "${{ needs.docsSite.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
