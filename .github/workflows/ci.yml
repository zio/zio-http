name: CI

env:
  JDK_JAVA_OPTIONS: >-
    -XX:+PrintCommandLineFlags -Xms4G -Xmx8G -XX:+UseG1GC -Xss10M
    -XX:ReservedCodeCacheSize=1G -XX:NonProfiledCodeHeapSize=512m
    -Dfile.encoding=UTF-8

on:
  pull_request:
  push:
    branches: ['main', 'v4.x']
    tags: ['v*']
  release:
    types: [published]

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:21
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Check formatting
        run: chmod +x ./mill && ./mill mill.scalalib.scalafmt/checkFormatAll

  compile:
    name: Compile with mill
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:21
          apps: sbt
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Publish zio-blocks SNAPSHOT locally
        run: |
          git clone --depth 1 https://github.com/zio/zio-blocks.git /tmp/zio-blocks
          cd /tmp/zio-blocks
          sbt compile 'set every version := "0.0.0-SNAPSHOT"' publishLocal
      - name: Compile all modules
        run: >-
          chmod +x ./mill &&
          ./mill
          'core.jvm[{3.8.3,2.13.18}].compile'
          'server.jvm[{3.8.3,2.13.18}].compile'
          'client.jvm[{3.8.3,2.13.18}].compile'
          'h2Codec.jvm[{3.8.3,2.13.18}].compile'
          'serverLoom.jvm[{3.8.3,2.13.18}].compile'
          'clientJava.jvm[{3.8.3,2.13.18}].compile'
          'zio.jvm[{3.8.3,2.13.18}].compile'

  testCoreJvm:
    name: JVM tests — Scala ${{ matrix.scala }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        scala: ['2.13.18', '3.8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: coursier/setup-action@v3
        with:
          jvm: temurin:21
          apps: sbt
      - name: Cache
        uses: coursier/cache-action@v8
      - name: Publish zio-blocks SNAPSHOT locally
        run: |
          git clone --depth 1 https://github.com/zio/zio-blocks.git /tmp/zio-blocks
          cd /tmp/zio-blocks
          sbt compile 'set every version := "0.0.0-SNAPSHOT"' publishLocal
      - name: Run supported JVM tests
        run: >-
          chmod +x ./mill &&
          ./mill
          'h2Codec.jvm[${{ matrix.scala }}].test'
          'serverLoom.jvm[${{ matrix.scala }}].test'
          'zio.jvm[${{ matrix.scala }}].test'

  docsSite:
    name: Build website
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'yarn'
          cache-dependency-path: website/yarn.lock
      - name: Build docs site
        run: ./build.sh

  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, compile, testCoreJvm, docsSite]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" == "failure" || \
                "${{ needs.compile.result }}" == "failure" || \
                "${{ needs.testCoreJvm.result }}" == "failure" || \
                "${{ needs.docsSite.result }}" == "failure" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
