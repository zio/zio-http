name: Auto-approve bot dependency PRs

on:
  pull_request_target:
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  auto-approve-bot-prs:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.actor == 'dependabot[bot]' ||
      github.actor == 'app/zio-scala-steward'
    steps:
      - name: Approve PR
        if: github.event_name == 'pull_request_target'
        run: gh pr review --approve ${{ github.event.number }}
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Backfill auto-approve for existing bot PRs
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          for actor in "app/zio-scala-steward" "app/dependabot"; do
            gh pr list \
              --author "$actor" \
              --state open \
              --json number \
              --jq '.[].number' | \
            xargs -I{} gh pr review --approve {}
          done
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GH_REPO: ${{ github.repository }}
